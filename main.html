<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>L40-209Thursday2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top, #001122, #000666);
      font-family: Orbitron;
      color: white;
    }

    h1 {
      margin-bottom: 30px;
      font-size: 32px;
      text-shadow: 0 0 10px lightcyan;
      text-align: center;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .row {
      display: flex;
      gap: 20px;
    }

    .cell {
      width: 160px;
      height: 160px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      border-radius: 20px;
      border: 2px solid transparent;
      text-decoration: none;
      color: white;
      font-size: 20px;
      transition: 0.3s;
    }

    .cell:hover {
      transform: scale(1.1);
    }

    .game1:hover { box-shadow: 0 0 25px #f43f5e; border-color: #f43f5e; }
    .game2:hover { box-shadow: 0 0 25px #f97316; border-color: #f97316; }
    .game3:hover { box-shadow: 0 0 25px #eab308; border-color: #eab308; }
    .game4:hover { box-shadow: 0 0 25px #22c55e; border-color: #22c55e; }
    .game5:hover { box-shadow: 0 0 25px #3b82f6; border-color: #3b82f6; }
    .game6:hover { box-shadow: 0 0 25px #a855f7; border-color: #a855f7; }

    .game1 { background-color: rgba(244, 63, 94, 0.7);}
    .game2 { background-color: rgba(249, 115, 22, 0.7);}
    .game3 { background-color: rgba(234, 179, 8, 0.7);}
    .game4 { background-color: rgba(34, 197, 94, 0.7);}
    .game5 { background-color: rgba(59, 130, 246, 0.7);}
    .game6 { background-color: rgba(168, 85, 247, 0.7);}

    .cell span.small {
      display: block;
      font-size: 14px;
      opacity: 0.6;
      margin-top: 5px;
    }

    img{
      width: 400px;
      height: 240px;
      align-items: center;
      background-color: rgba(222, 184, 135, 0.7);
      border-radius: 20px;
      box-shadow: 0 0 25px burlywood; 
      border-color: burlywood;
    }

    .photo{
      text-align: center;
    }

  </style>
</head>
<body>

  <div class="side left"></div>

      <a class="cell game2" href="https://darkpupsik2412.github.io/cursovajs/main.html" target="_blank"><div>Goodbye Good Boy<span class="small">Пакош Дарій</span></div></a>
